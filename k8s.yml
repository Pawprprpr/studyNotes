# ============================================
# 1. Namespace（环境隔离，可选但推荐）
# ============================================
apiVersion: v1
kind: Namespace
metadata:
  name: myapp-dev  # 开发环境用dev，生产用prod

---
# ============================================
# 2. ConfigMap（普通配置）
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
  namespace: myapp-dev
data:
  # 应用配置（键值对）
  APP_NAME: "MySpringBootApp"
  LOG_LEVEL: "INFO"
  # 也可以挂载配置文件
  application.yml: |
    server:
      port: 8080
    spring:
      datasource:
        url: jdbc:mysql://mysql-service:3306/mydb

---
# ============================================
# 3. Secret（敏感信息，密码会base64编码）
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: myapp-secret
  namespace: myapp-dev
type: Opaque
data:
  # 注意：value 必须是 base64 编码
  DB_PASSWORD: bXlwYXNzd29yZA==  # echo -n "mypassword" | base64
  API_KEY: dGVzdC1rZXktMTIzNDU2

---
# ============================================
# 4. Deployment（无状态应用，最核心！）
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  namespace: myapp-dev
  labels:
    app: myapp
    version: v1
spec:
  replicas: 3  # 3个副本，自动负载均衡
  
  # 升级策略（滚动更新）
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # 最多多起1个Pod
      maxUnavailable: 0  # 最多停0个Pod（保证服务不中断）
  
  # 选择器（必须和template里的labels匹配）
  selector:
    matchLabels:
      app: myapp
  
  # Pod 模板
  template:
    metadata:
      labels:
        app: myapp
        version: v1
    spec:
      # 容器配置
      containers:
      - name: myapp-container
        image: myregistry/myapp:v1  # 改成你的镜像
        
        # 端口
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        
        # 环境变量（从ConfigMap和Secret读取）
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: myapp-secret
              key: DB_PASSWORD
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: myapp-config
              key: APP_NAME
        
        # 资源限制（重要！！！）
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # 健康检查（存活探针，挂了自动重启）
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30  # 启动后等30秒再检查
          periodSeconds: 10         # 每10秒检查一次
        
        # 健康检查（就绪探针，好了才给流量）
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        
        # 挂载ConfigMap（文件方式，支持热更新）
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      
      # 卷定义
      volumes:
      - name: config-volume
        configMap:
          name: myapp-config

---
# ============================================
# 5. Service（服务发现，给Pod提供固定IP）
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: myapp-service
  namespace: myapp-dev
spec:
  # 类型：ClusterIP（默认，集群内访问）
  #       NodePort（集群外访问，用节点IP+端口）
  #       LoadBalancer（云厂商负载均衡器）
  type: ClusterIP
  
  # 端口映射
  ports:
  - port: 80           # Service监听的端口
    targetPort: 8080   # 转发到Pod的端口
    protocol: TCP
    name: http
  
  # 选择器（必须匹配Pod的labels）
  selector:
    app: myapp

---
# ============================================
# 6. Ingress（外部访问，域名路由）
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  namespace: myapp-dev
  annotations:
    # 如果用的是华为云CCE，可能需要指定Ingress Class
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
  - host: api.myapp.com  # 你的域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: myapp-service
            port:
              number: 80

---
# ============================================
# 7. 可选：StatefulSet（有状态应用，如MySQL）
# ============================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-statefulset
  namespace: myapp-dev
spec:
  serviceName: mysql-service  # 必须指定headless service
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: myapp-secret
              key: DB_PASSWORD
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:  # 自动创建PVC
  - metadata:
      name: mysql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi

---
# 配套的Headless Service（给StatefulSet用）
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: myapp-dev
spec:
  clusterIP: None  # Headless Service
  selector:
    app: mysql
  ports:
  - port: 3306
